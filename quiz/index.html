<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WinEcon — Economics Quiz</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div class="window" role="application" aria-label="Economics quiz">

    <!-- Title bar -->
    <div class="titlebar">
      <!-- WinEcon application icon: blue chart -->
      <svg class="win-icon" viewBox="0 0 16 16" aria-hidden="true">
        <rect x="0.5" y="0.5" width="15" height="15" rx="2" fill="#15357e" stroke="#0d2050"/>
        <rect x="2.4" y="9"   width="2.2" height="4.6" fill="#43c843"/>
        <rect x="6"   y="6.4" width="2.2" height="7.2" fill="#43c843"/>
        <rect x="9.6" y="3.9" width="2.2" height="9.7" fill="#43c843"/>
        <polyline points="2,11 6,6 9,8 14,2.6" fill="none" stroke="#ffffff" stroke-width="1.3"/>
      </svg>
      <span class="title-text" id="titlebarText">WinEcon / Introduction to Microeconomics / Tests / Perfect Competition and&hellip;</span>
      <span class="win-buttons">
        <button title="Minimize" aria-hidden="true">
          <svg width="9" height="9" viewBox="0 0 9 9"><rect x="1" y="6.2" width="6" height="1.5" fill="#000"/></svg>
        </button>
        <button title="Maximize" aria-hidden="true">
          <svg width="9" height="9" viewBox="0 0 9 9"><rect x="1" y="1" width="7" height="7" fill="none" stroke="#000" stroke-width="1.4"/><rect x="1" y="1" width="7" height="1.8" fill="#000"/></svg>
        </button>
        <button title="Close" aria-hidden="true">
          <svg width="9" height="9" viewBox="0 0 9 9"><path d="M1.4 1.4 L7.6 7.6 M7.6 1.4 L1.4 7.6" stroke="#000" stroke-width="1.5"/></svg>
        </button>
      </span>
    </div>

    <!-- Main content panel -->
    <div class="content">
      <div class="header">
        <!-- Study icon: red book + blue steaming coffee mug -->
        <svg class="topic-icon" viewBox="0 0 36 36" aria-hidden="true">
          <!-- steam -->
          <path d="M22 11 q-2.2 -3 0 -5 q2.2 -2 0 -5" fill="none" stroke="#d4e3f6" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M27 11 q2.2 -3 0 -5 q-2.2 -2 0 -5" fill="none" stroke="#eaf2fc" stroke-width="1.4" stroke-linecap="round"/>
          <!-- mug -->
          <path d="M30 16 a3.7 3.7 0 0 1 0 6.4" fill="none" stroke="#1f5fc4" stroke-width="2.2"/>
          <path d="M19 14 h11 v7 a4 4 0 0 1 -4 4 h-3 a4 4 0 0 1 -4 -4 z" fill="#1f5fc4"/>
          <path d="M21 15 q-0.8 5 0 9" fill="none" stroke="#6ea0ea" stroke-width="1.4" stroke-linecap="round"/>
          <ellipse cx="24.5" cy="14" rx="5.5" ry="1.9" fill="#4a86e0"/>
          <ellipse cx="24.5" cy="14" rx="3.6" ry="1.1" fill="#15357e"/>
          <!-- book (in front) -->
          <polygon points="4,27 17,23 30,27 17,31" fill="#d23b2f"/>
          <polygon points="17,31 30,27 30,30 17,34" fill="#f3ead0"/>
          <polygon points="4,27 17,31 17,34 4,30" fill="#e6dcbd"/>
          <polyline points="9,26.5 17,24 25,26.5" fill="none" stroke="#f0c0b8" stroke-width="0.8"/>
        </svg>
        <div class="header-text">
          <span class="kind-label" id="kindLabel">Test</span>
          <h1 id="quizTitle">Perfect Competition and Monopoly</h1>
        </div>
      </div>

      <!-- Stats bar -->
      <div class="stats" id="statsBar">
        <span>Question value: <span class="stat-value" id="statValue">10%</span></span>
        <span>Answered: <span class="stat-value" id="statAnswered">0/10</span></span>
        <span>Score: <span class="stat-value" id="statScore">0%</span></span>
        <span>Time: <span class="stat-value" id="statTime">0:00 / 1:00</span></span>
      </div>
      <hr class="divider">

      <!-- Question -->
      <div class="question-area" id="questionArea">
        <p class="question-text" id="questionText"></p>
        <ul class="options" id="optionsList"></ul>
        <div class="feedback" id="feedback" role="status" aria-live="polite"></div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <span class="counter" id="counter">1 of 10</span>
        <input type="range" class="slider" id="slider" min="1" max="10" value="1" aria-label="Jump to question">
        <button class="win-btn" id="markBtn">Mark</button>
        <button class="win-btn" id="explainBtn">Explain</button>
        <button class="win-btn" id="topicBtn">Topic</button>
        <button class="nav-arrow" id="prevBtn" title="Previous question">
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M9 1 L2 6 L9 11 M2 6 H14" fill="none" stroke="#000" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>
        </button>
        <button class="nav-arrow" id="nextBtn" title="Next question"></button>
      </div>
    </div>

    <!-- Status footer -->
    <div class="statusbar">
      <button class="pill" id="instructionsBtn">Instructions</button>
      <!-- Centre mascot badge: silver ring with gold graduation cap -->
      <div class="center-badge" title="WinEcon">
        <svg viewBox="0 0 30 26" aria-hidden="true">
          <defs>
            <radialGradient id="ring" cx="50%" cy="38%" r="65%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#cdd3da"/>
              <stop offset="100%" stop-color="#8b9099"/>
            </radialGradient>
          </defs>
          <ellipse cx="15" cy="13" rx="14" ry="12" fill="url(#ring)" stroke="#7c828b" stroke-width="0.6"/>
          <ellipse cx="15" cy="13" rx="10" ry="8.4" fill="#e7eef6"/>
          <path d="M10 12 v3 a5 2.4 0 0 0 10 0 v-3" fill="#c79a1c"/>
          <polygon points="15,7.5 24,11 15,14.5 6,11" fill="#eab923"/>
          <line x1="23.5" y1="11" x2="23.5" y2="16.5" stroke="#c79a1c" stroke-width="0.9"/>
          <circle cx="23.5" cy="16.8" r="1" fill="#eab923"/>
        </svg>
      </div>
      <button class="pill" id="contentsBtn">Contents <span aria-hidden="true">&#9650;</span></button>
    </div>

  </div>

  <script src="quiz.js?v=2"></script>
</body>
</html>
